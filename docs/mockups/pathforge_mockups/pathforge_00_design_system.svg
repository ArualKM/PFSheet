<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000">
<title>PathForge Design System Board</title><defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#080C11"/>
          <stop offset="0.55" stop-color="#0E141B"/>
          <stop offset="1" stop-color="#151D28"/>
        </linearGradient>
        <radialGradient id="orbGold" cx="20%" cy="10%" r="80%">
          <stop offset="0" stop-color="#F0B35A" stop-opacity="0.18"/>
          <stop offset="0.5" stop-color="#F0B35A" stop-opacity="0.04"/>
          <stop offset="1" stop-color="#F0B35A" stop-opacity="0"/>
        </radialGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
        </filter>
        <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.22"/>
        </filter>
        <pattern id="noise" width="80" height="80" patternUnits="userSpaceOnUse">
          <circle cx="10" cy="12" r="0.7" fill="#ffffff" opacity="0.04"/>
          <circle cx="60" cy="28" r="0.5" fill="#ffffff" opacity="0.035"/>
          <circle cx="33" cy="66" r="0.8" fill="#ffffff" opacity="0.03"/>
          <circle cx="74" cy="72" r="0.6" fill="#ffffff" opacity="0.025"/>
        </pattern>
        <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#17212C"/>
          <stop offset="1" stop-color="#101720"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#F0B35A"/>
          <stop offset="1" stop-color="#67D5FF"/>
        </linearGradient>
        </defs>
<rect width="1440" height="1000" fill="url(#bgGrad)"/>
