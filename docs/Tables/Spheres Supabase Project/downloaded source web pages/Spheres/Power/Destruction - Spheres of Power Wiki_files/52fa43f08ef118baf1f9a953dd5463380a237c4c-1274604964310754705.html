y 1 step.', '90: Any rods, shields, staves, or weapons held by the caster take half the damage that would have been dealt by the effect.', '91: The blast does untyped damage.', '92: The caster gains resistance or damage reduction to the damage type or types of the effect equal to caster level for 1d4 rounds. This applies before the damage of the effect.', '93: In addition to the normal range and shape, the effect creates a close range burst that includes the caster. A Reflex save halves damage from this additional area. Damage from overlapping areas does not stack.', '94: The ground directly beneath the space of the caster receives the damage of the effects in addition to the normal targets.', '95: The effect is accompanied by a burst of fire. All creatures within a 5 ft. + 5 ft. per 5 caster level radius of the caster take 1d4 + 1d4 per 5 caster levels fire damage, Reflex save negates. Unattended flammable objects are set on fire.', '96: (Combat) The caster is nauseated for 1 round.', '97: The effect is resolved as normal, but damage and secondary effects are not applied until the end of the next turn of the caster.', '98: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '99: The effect is empowered as the Empower Spell metamagic feat. This does not stack with that feat.', '100: Any creature that takes damage from the effect gains immunity to the damage types of the effect for 1 minute.'];
