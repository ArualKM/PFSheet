<script>
    function randString(){

        randomResult.appendChild(sp);

    rand = Math.random;
    stringArray = ['1: The caster becomes blind, but gains 60 feet blindsight that can only be used to see creatures that can store spell points, as well as any magical effects, terrain or items. This lasts for 1 hour.', '2: The target of the caster (if any) can always sense the location of the caster for 1 hour per caster level.', '3: The caster gains knowledge of one talent of their choice from any sphere they qualify for for 1 round.', '4: A flux of magic enhances all effects. An area of potent magic is created in a 20-foot radius around the caster, which remains for 24 hours. Any effects cast within this radius are treated as if any variable components rolled their maximum possible number.', '5: Mana becomes as clear as light. You detect magic constantly as the base Divination sphere ability for 1 hour per caster level, and any attempt to identify magic items or effects with a Spellcraft check are treated as if you rolled a natural 20 on the check.', '6: Until the end of the next turn of the caster, all spell point costs the caster must pay are waived.', '7: Magic becomes obvious. Any creature being targeted by a magical effect within close range of the caster automatically knows the type of effect and the source of the effect. This lasts for 1 minute per caster level.', '8: Antimagic bleeds from the leylines of the world. Each round there is a 25% chance that a random adjacent tile to the caster (roll a 1d8 to determine the tile, with 1 being north and rotating clockwise) is splashed with liquid antimagic, removing 1 spell point from any creature that walks into it (or applying a -1 penalty to a random mental ability score if they do not have spell points), but granting them a +2 bonus to all saving throws they attempt against magic for 24 hours. This effect lasts for 1 round per caster level.', '9: Roll again on the Universal wild magic table.', '10: Your manabonds fuse incredibly easily. You may create a manabond as a free action to any creature within close range until the end of your next turn. Unwilling creatures get a Will save to resist this.', '11: Effect receives a -4 penalty to caster level (minimum 1).', '12: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls are ignored, there is no effect.', '13: The spell point cost of the effect is reduced to 0.', '14: Power becomes absolute. All penalties or bonuses to caster levels, magic skill bonuses and magic skill defenses are negated in a close range radius around you. This lasts for 1 round per caster level.', '15: In a medium range, the weather immediately shifts 1d4 severity levels higher for Precipitation, but the clouds instead rain bright blue globs of mana. If the severity level is at least 4, each round the caster is exposed to the skies, they have a 5% chance of being struck by electrical mana, dealing 1d6 electric damage per caster level, but granting them 1 spell point per 2 caster levels. This lasts until the caster is struck once, or for 1 hour.', '16: The effect is modified by a metamagic feat the caster chooses, though they spend 1 additional spell point in the effect in addition to the extra cost of the metamagic feat. The caster may only select metamagic feats they do not possess.', '17: The target of the caster is stunned for 1 round. Fortitude negates.', '18: The casting time increases by 2 steps.', '19: The caster is fatigued. If they were already fatigued, they are exhausted.', '20: Until the end of the next turn of the caster, all spell point costs the caster must pay are waived.', '21: The next spell cast within close range of the caster automatically targets the caster, regardless of its maximum range or intended target. This lasts for 1 hour, or until a spell is redirected to the caster.', '22: Roll again on the Universal wild magic table.', '23: The caster becomes blind, but gains 60 feet blindsight that can only be used to see creatures that can store spell points, as well as any magical effects, terrain or items. This lasts for 1 hour.', '24: Mana bleeds from the leylines of the world. Each round, there is a 25% chance that a random adjacent tile to the caster (roll a 1d8 to determine the tile, with a 1 being north and rotating clockwise) is splashed with liquid mana, granting any creature that walks into it 1 spell point, but bestowing a -2 penalty to all saving throws they attempt against magic for 24 hours. This effect lasts for 1 round per caster level.', '25: Suffer a -2 penalty to your caster level for 1 day, or until another creature grants a spell point to you, whether temporary or not.', '26: Your mana imprints to the floor. A permanent sigil spreading around a 15-foot radius around you is engraved into the floor. Any casters utilizing sphere effects on top of this sigil gain a +2 bonus to their caster level.', '27: The effect is fully paid by energy from tomorrow. The sphere effect costs no spell points to cast, but the next time the spellcaster gains spell points, they subtract the amount of spell points they would have spent.', '28: You strain your body, using your vitality by mistake. Instead of paying the spell point cost for this sphere effect, you instead take 1 Constitution drain for each spell point you would have spent (minimum 1).', '29: Your magic takes a life of its own - and it does not appreciate your use. The spell effect gains life, as the Bestow Magic Life advanced talent (see Enhancement sphere) and is not cast normally, instead remaining for a number of rounds equal to your caster level. It begins with an attitude initially hostile against you, and will utilize its powers to inhibit the caster for as long as it lives (including using its ability to cast sphere effects on the caster, or to grant spell points to enemies). As long as this creature lives, you cannot make use of the Mana sphere.', '30: You confuse yourself, temporarily forgetting how to use your magic. You suffer from the Mark Of Incompetency talent, using your level as its caster level. Randomly determine the drawbacks you gain.', '31: Mana bleeds from the leylines of the world. Each round, there is a 25% chance that a random adjacent tile to the caster (roll a 1d8 to determine the tile, with a 1 being north and rotating clockwise) is splashed with liquid mana, granting any creature that walks into it 1 spell point, but bestowing a -2 penalty to all saving throws they attempt against magic for 24 hours. This effect lasts for 1 round per caster level.', '32: The body of the caster becomes transparent for 24 hours, granting them a +5 bonus on Stealth checks as long as they do not wear any clothing and do not hold or carry any items (including backpacks).', '33: You gain spell resistance equal to 5 + your caster level for 1 hour. You may not lower this spell resistance.', '34: For 1 minute, all magic items within long range of the caster shed light as a torch.', '35: The casting time increases by 1 step.', '36: Antimagic bleeds from the leylines of the world. Each round there is a 25% chance that a random adjacent tile to the caster (roll a 1d8 to determine the tile, with 1 being north and rotating clockwise) is splashed with liquid antimagic, removing 1 spell point from any creature that walks into it (or applying a -1 penalty to a random mental ability score if they do not have spell points), but granting them a +2 bonus to all saving throws they attempt against magic for 24 hours. This effect lasts for 1 round per caster level.', '37: For 1 minute, all magic items within long range of the caster shed light as a torch.', '38: All spellcasters within medium range immediately shed light as a torch, and special orbs revolve around them exposing the exact spheres they know, or magical schools they know spells of.', '39: The caster drains a single spell point from any other creature that has spell points within close range. Creatures may attempt a Fortitude save to negate this effect. Drained spell points are removed from the drained creature, and granted to the caster as temporary spell points that remain for 1 round per caster level.', '40: A zone of antimagic is created, stretching out in a 10-foot radius from the square the caster is in. The zone nullifies the spell that triggered it, and remains for 1 day per caster level.', '41: The caster emits light as a torch for 1 hour.', '42: An explosion of mana invigorates everyone. You and all allies within medium range gain 3 temporary spell points that last for 1 hour. Spells cast with these temporary spell points gain a +4 to their caster level to the effect.', '43: The caster becomes truly enlightened. They lose half of their maximum spell points, but increases their caster level by 4, and they gain knowledge of one additional talent in each base sphere they possess. This lasts for 1 hour.', '44: The caster suffers 2 ability drain to their casting ability modifier, even if they would normally be immune to ability drain.', '45: You gain immunity to magic, becoming immune to all spells or spell-like abilities that allow spell resistance, but your caster level is reduced to 1. This lasts for 1 round per caster level.', '46: Magic abandons their host. All spellcasters within close range are no longer able to utilize their spellcasting, and for each spellcaster, a random other creature within range gains all of their spellcasting capabilities. This only includes spell points, base caster levels and magic skill bonuses and defense, and not class features. This effect remains for 2 rounds, where the spellcasting capabilities return to their host (not including any spent spell points).', '47: The next sphere effect the caster utilizes, they may add a bonus to that sphere effect up to their caster level. The next two sphere effects they cast that costs a spell point has their caster level reduced by the amount the caster chose to increase their first cast by.', '48: The effect becomes ultrapowered. Increase the caster level of the effect by 10, but increase the spell point cost by 5. If the caster does not have enough spell points to cast the effect, they are exhausted, but the spell effect is still cast.', '49: You gain immunity to magic, becoming immune to all spells or spell-like abilities that allow spell resistance, but your caster level is reduced to 1. This lasts for 1 round per caster level.', '50: You gain 60 feet scent, but can smell magic instead, allowing you to spend a standard action identifying a single creature or object to learn information about magical effects on that creature or object, as the base Divination ability. The use of magic doubles the range of your scent, and dead magic zones reduce it by half. This lasts for 24 hours.', '51: The casting time increases by 1 step.', '52: Any manabonds the caster has active immediately become physical, as if casted with the Hardened Bond talent. This remains until the manabond otherwise expires normally.', '53: For 1 hour, all attempts to utilize a sphere effect within medium range causes a swirling, rainbow colored orb to float around the caster.', '54: Your magic blasts away foreign energies. In addition to its normal effects, you may make a free Counterspell attempt (as if you possessed the Counterspell feat) against any effects of your choice that your target has active upon them, and may exclude any effects you know of from this attempt.', '55: The caster loses access to this sphere for 1d6 rounds.', '56: You channel yourself too much into your magic; you become a creature of magic, gaining spell immunity to all spheres except the Mana sphere, but creatures can target you with antimagic effects. If you enter an antimagic field, are targeted by an antimagic effect (such as Counterspell), or otherwise enter a zone of dead magic, you must succeed at a Fortitude save each round or be slain. This lasts for 1 minute.', '57: An errant manabond is created. You create a Funnel manabond between yourself and an enemy within close range, if any. That creature is considered the creator of this manabond, and may drain your spell points if they continue to concentrate on it. Use your caster level for the caster level of this manabond.', '58: A magical sigil engraves on the ground, filling an area with a 30-foot radius centered on the caster. Any beneficial magical effect cast on a target within this sigil is also cloned and cast upon every other creature standing on the sigil. The sigil remains for 24 hours.', '59: The caster gains knowledge of one talent of their choice from any sphere they qualify for for 1 round.', '60: Effect receives a -4 penalty to caster level (minimum 1).', '61: The caster learns an eldritch secret about mana. They gain knowledge of a Mana sphere talent they qualify for for 24 hours.', '62: The spell point cost of the effect increases by 1d4. If the caster does not have enough spell points, they are instead dazed until the end of their next turn.', '63: All creatures you have a manabond with are electrocuted by a sudden wave of mana. Deal 1d4 untyped damage for every odd level you have to yourself and any creature you have a manabond with.', '64: A hostile sigil engraves into the ground, filling an area with a 30-foot radius centered on the caster. Any expenditure of spell points within this area causes the creature spending spell points to suffer 1d8 nonlethal damage for each spell point spent. This damage increases by 1 die at 3rd caster level and every 3 levels thereafter. The sigil remains for 24 hours.', '65: Any temporary spell points that any creature possesses within close range suddenly burst in a chaotic puff of energy, dealing 1d8 untyped damage per temporary spell point lost to the creatures that had them.', '66: You lose your sense of targeting. For 1 round per caster level, every time you utilize a targeted sphere effect, you must randomly decide the target between any creatures within valid range.', '67: (Combat) Caster is stunned for 1 round.', '68: If the effect has a duration longer than instantaneous, it instead only remains for 1 round, but the caster level of the effect is increased by 10. If it is instantaneous, reroll this result.', '69: All manabonds in close range are immediately subject to a dispel attempt with a result of 11 + the caster level of the caster.', '70: The caster learns an eldritch secret about mana. They gain knowledge of a Mana sphere talent they qualify for for 24 hours.', '71: A catastrophic reaction occurs. All creatures within medium range must succeed at a Fortitude save or lose spell points equal to their Hit Dice. The caster loses all of their spell points on a failed save.', '72: The spell point cost of the ffect is reduced to 0.', '73: The ultimate catastrophic decay of internal magic occurs. For each base sphere the caster knows, they must roll a wild magic event on the respective table for the sphere, in addition to rolling once on the Universal wild magic table.', '74: The target of the caster is stunned for 1 round. Fortitude negates.', '75: The caster gains a +2 inherent bonus to their casting ability modifier for 1 minute.', '76: The mana of the caster separates from the caster, forming a perfect transparent blue version of themselves that moves with them but is displaced 1 foot to the left. This remains for 24 hours.', '77: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls are ignored, there is no effect.', '78: The effect fails, but the action is not lost. Spell points or spell slots spent are lost.', '79: Magical energies flow away from you easily. The next beneficial spell that is cast upon you is instead granted to a random enemy within close range. The caster is not aware of this effect, and the benefiting creature may choose to not activate this ability if the effect does not satisfy them, instead waiting for a different one to apply it to. This lasts for 1 hour.', '80: You gain spell resistance equal to 5 + your caster level for 1 hour. You may not lower this spell resistance.', '81: 1d6 random simple weapons suddenly materialize at the feet of the caster, though such weapons are made of pure mana and are worthless. They remain permanently.', '82: The casting time increases by 2 steps.', '83: The effect fails, the action is lost, and spell points or spell slots spent are lost.', '84: The caster is exhausted. If they were already exhausted, they fall asleep.', '85: For 1 hour, all penalties to the caster level of the caster are instead treated as untyped bonuses.', '86: Roll again on the Universal wild magic table.', '87: If the effect is instantaneous, the caster level is reduced to 1, but the effect applies again at the start of the turn of the target for a number of rounds equal to the casting ability modifier of the caster. If the effect is not instantaneous, reroll this result.', '88: Wild energies infuse your magic. For 1 round per caster level, none of your effects may be negated by counterspells, antimagic fields or similar sources of antimagic.', '89: For 1 hour, every time you spend a spell point, you suffer untyped damage equal to the caster level of the effect for each spell point spent.', '90: The hair of the caster is recolored to a vibrant blue color permanently. This can be dispelled normally.', '91: Your magic infuses itself into your target. If you were casting a sphere effect on an ally or willing creature, you reduce their spell resistance by an amount equal to your casting ability modifier (or apply a penalty all saving throws they attempt against magic effects by the same amount). If you were casting on an enemy, you instead increase their spell resistance (or grant them a bonus on such effects). This lasts for 2 rounds.', '92: The caster gains a +2 inherent bonus to their casting ability modifier for 1 minute.', '93: The caster emits light as a torch for 1 hour.', '94: Your magic evaporates, with it leaving a leaking hole of mana within you. The spell fails and all spell points are lost, and you lose 1 spell point at the start of each turn until you spend a full-round action restabilizing your magic by spending 1 spell point.', '95: For 1 minute, each time the caster attempts to utilize a magic talent that is not in the Mana sphere, they are targeted by the base Spellburn talent. Use the caster level and magic skill bonus of the caster to determine the effects of this talent.', '96: All creatures within close range of the caster, including the caster, display obvious signs of how many spell points they have remaining, as detailed under the Unstable Storage general drawback.', '97: The caster suffers from the Vulnerable Caster drawback for 1 day, gaining no benefits for it.', '98: Magic becomes a beacon. All spellcasters that utilize a magic effect within medium range suffer a -1 penalty to their armor class for each magic effect they cast for the duration of this effect, and the penalty stacks with itself. This lasts for 1 minute per caster level.', '99: For 1 hour, all penalties to the caster level of the caster are instead treated as untyped bonuses.', '100: The caster suffers 1d6 ability damage to their casting ability, even if they would normally be immune to ability damage.'];
