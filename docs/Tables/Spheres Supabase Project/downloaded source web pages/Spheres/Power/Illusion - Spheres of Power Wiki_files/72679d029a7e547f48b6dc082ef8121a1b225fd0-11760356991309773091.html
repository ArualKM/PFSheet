    rand = Math.random;
    stringArray = ['1: A longsword appropriately sized for the caster made of shadow-stuff appears in the hand of the caster. The caster is proficient with this weapon and it deals bonus damage equal to caster level. Each time it deals damage, the target is allowed a Will save; success reduces the damage dealt by half and destroys the blade. Otherwise the blade persists for 1 hour per caster level or until it leaves the possession of the caster.', '2: The spell point cost of the effect decreases by 1. If the effect did not require any spell points, the caster instead gains 1 temporary spell point that expires at the end of his next turn.', '3: All creatures within close range of the caster gain the appearance and odor of being covered in excrement for 10 minutes per caster level.', '4: The caster is unable to perceive the effect in any fashion, leaving him unable to control, alter, or dismiss it once cast.', '5: For 1 minute per caster level, an illusory raincloud follows the caster. The caster is unable to disbelieve this raincloud.', '6: An illusion depicting the greatest desire of the caster appears within long range and persists for 1 round per caster level. This figment cannot be larger than the maximum illusion size of the caster.', '7: For 1 hour per caster level, an illusory duck sits on the casters head and cannot be covered by any means.', '8: (Combat) All creatures within medium range gain illusory doubles. These illusory doubles impose a 50% miss chance on any attack against the creature and each duplicate disappears after one attack fails against this miss chance or after 1 minute per caster level.', '9: An illusory wind surrounds fills the illusion range of the caster, acting as per the category 3 wind of the Weather sphere + 1 category per 7 caster levels. This wind blows directly toward the caster and dissipates after 1 round per caster level. Hostile creatures are unaffected.', '10: For 1 round per caster level, a swarm of illusory insects covers an area out to illusion range, dealing 1 point of nonlethal damage per 2 caster levels. This effect moves with the caster. When first exposed to this effect, a creature is allowed a single Will save to negate the damage from this effect for its duration.', '11: For 1 hour per caster level, dramatic effects, music, and crowd noises accompany the caster whenever he makes a Perform skill check, granting a competence bonus equal to 1/2 caster level (minimum 1) on such checks.', '12: For 1 minute per caster level, all sound is amplified within close range of the caster, granting a circumstance bonus equal to 1/2 caster level on sound-based Perception checks.', '13: For 10 minutes per caster level, the voice of the caster is amplified, granting a bonus on Perception checks to hear the caster speak equal to caster level.', '14: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '15: For 1 minute per caster level, all sound is dampened within long range of the caster, imposing a penalty equal to 1/2 caster level on sound-based Perception checks.', '16: For 1 round per caster level, all of the attended objects of the caster become invisible as the Invisibility talent.', '17: The caster gains knowledge of one talent of his choice from this sphere for 1 round.', '18: (Combat) Rapidly shifting illusory disguises that only the caster can perceive make it impossible for the caster to distinguish friend from foe. For 1d6 rounds, the caster may not make attacks of opportunity against any creature.', '19: The caster takes a number of points of ability damage to his casting attribute equal to the caster level/4 (minimum 1) of the effect, even if he would normally be immune to ability damage.', '20: The caster loses knowledge of any of the talents used in the effect (but not the base sphere) for the length of the effect (minimum 1 round).', '21: The spell point cost of the effect increases by 1. If the caster does not have enough spell points, he is instead staggered until the end of his next turn.', '22: The next time that the caster enters a settlement with more than 100 inhabitants, his arrival is heralded by an intense display of illusory fireworks over his position, clearly visible and audible for 2d6 miles if in an open area.', '23: Any creature making a Will save to disbelieve the effect may roll twice and take the best result.', '24: (Combat) For 1d6 rounds, all creatures within medium range become invisible as the Invisibility talent.', '25: For 10 minutes per caster level, the sound generated by the movements of the caster are amplified, imposing a penalty on Stealth checks equal to caster level.', '26: For 1 minute per caster level, the caster is unable to see through his own illusions.', '27: (Combat) The caster is stunned for 1 round.', '28: For 1 hour per caster level, the clothes of the caster appear dramatically inappropriate to the surrounding area (winter clothes in a desert, rags in a palace, etc.).', '29: For 1 minute per caster level, any words the caster thinks are displayed by letters floating above his head. This may make Bluff checks fail automatically.', '30: For 10 minutes per caster level, a subtle illusion alters an area out to long range from the caster, making the environment appear bright and cheery. Creatures within this area may roll twice and take the best result on saves against fear effects and any demoralization check within this area takes a penalty equal to 1/2 caster level (minimum 1).', '31: The caster is fatigued.', '32: The caster loses access to this sphere for 1d6 rounds.', '33: The effect ends the first time a creature within 20 ft. of it succeeds on a Will save against an Illusion sphere or illusion school effect.', '34: For 1 hour per caster level, an illusory fog surrounds fills the illusion range of the caster, acting as a fog per the category 2 precipitation of the weather sphere. This fog follows the caster.', '35: Effect receives a +2 bonus to caster level.', '36: The casting time decreases by 1 step.', '37: All creatures within long range of the caster have their faces covered by an illusion of the face of the caster for 1 minute per caster level. This has no impact on their senses but may prove confusing.', '38: For 10 minutes per caster level, the caster gains the appearance and odor of being covered in excrement.', '39: The effect fails, but the action is not lost. Spell points or spell slots spent are lost.', '40: For 10 minutes per caster level, an illusory minstrel follows the caster, singing loudly of the most embarrassing moments of the caster.', '41: All allied creatures within illusion range must succeed on a Will save or gain an illusory disguise as the Illusionary Disguise talent, appearing as the nearest hostile creature for 1 minute per caster level.', '42: All creatures and objects within medium range of the caster are permanently monochromatic. This effect can only be removed by the Break Enchantment talent of the Life sphere or similar magic.', '43: The effect fails and the action is lost. Spell points or spell slots are lost.', '44: For 1 hour per caster level, the caster leaves a trail of phantasmal gold coins whenever moving at least 5 ft., creating 1 coin per caster level per 5 ft. moved. These coins disappear 1 minute per caster level after appearing or immediately if spent.', '45: The effect fails and the action is lost. Spell points or spell slots are not lost.', '46: For 10 minutes per caster level, an illusory minstrel follows the caster, singing loudly of the greatest deeds of the caster.', '47: (Combat) Rapidly shifting illusory disguises that only the caster can perceive make it impossible for the caster to distinguish friend from foe. For 1d6 rounds, the caster treats all creatures as hostile and must attempt attacks of opportunity against all creatures and attempt saves against all effects whenever possible.', '48: All creatures and objects within medium range of the caster are permanently stained a bright color that the GM chooses. This effect can only be removed by the Break Enchantment talent of the Life sphere or similar magic.', '49: For 10 minutes per caster level, the caster is followed by a cartoonish figment of himself that mimics his actions in a mocking way.', '50: For 1d6 rounds, attempts to disbelieve the effect automatically fail.', '51: Effect receives a -4 penalty to caster level (minimum 1).', '52: For 10 minutes per caster level, the caster leaves glowing illusory footprints wherever he travels (including while flying, swimming, and teleporting). These footsteps persist for 1 hour.', '53: All creatures within close range of the caster when the effect is cast must succeed on a Will save or have every word they think displayed by letters floating above their head for 1 minute per caster level. This may make Bluff checks fail automatically.', '54: Illusory heat surrounds fills the illusion range of the caster, acting as per the category 3 heat of the Weather sphere + 1 category per 7 caster levels. Hostile creatures are unaffected.', '55: For 1 round per caster level, an illusory fog surrounds fills the illusion range of the caster, acting as a fog per the category 3 precipitation of the Weather sphere. This fog follows the caster.', '56: All creatures within medium range of the caster when this result is triggered leave glowing illusory footprints wherever they travel (including while flying, swimming, and teleporting) for 10 minutes per caster level. These footsteps persist for 1 hour.', '57: The effect appears subtly off, granting a +2 bonus to save DCs to disbelieve it.', '58: For 1 hour per caster level, a dramatic illusory fog covers the area around the feet of the caster. This does not provide any concealment to the caster, but may obscure caltrops, tripwires, and other low-lying objects.', '59: All creatures within illusion range gain an illusory disguise as the Illusionary Disguise talent agic.', '72: The caster takes untyped nonlethal damage equal to caster level. This damage does not force concentration checks to cast or maintain sphere effects or spells.', '73: (Combat) The caster is dazed for 1 round.', '74: For 1 round per caster level, a figment of a creature the GM chooses with a CR of at least their Hit Dice + 2 compared to the caster appears within medium range of the caster and menaces the caster and allies.', '75: (Combat) All hostile creatures within long range gain illusory doubles that only the allies of the caster can perceive. These illusory doubles impose a 50% miss chance on any attack against the creature and each duplicate disappears after one attack fails against this miss chance or after 1 minute per caster level.', '76: The casting time increases by 1 step.', '77: An illusion appears in the square of the caster depicting a flash of flame and the charred corpse of the caster falling to the ground. The caster becomes invisible as the Invisibility talent for 1d6 rounds.', '78: (Combat) Rapidly shifting illusory disguises make it impossible for any creature within close range of the caster to distinguish friend from foe. For 1d6 rounds, the all creatures in the area must succeed on a Will save each round or treat all creatures within the area as hostile and must attempt attacks of opportunity against all creatures in the area and attempt saves against all effects originating from creatures within the area whenever possible.', '79: (Combat) For 1d6 rounds, all hostile creatures within medium range become invisible as the Invisibility talent.', '80: The caster and all his attended objects are permanently stained a bright color the GM chooses. This effect can only be removed by the Break Enchantment talent of the Life sphere or similar magic.', '81: The caster makes a single magical skill check against all Illusion sphere effects and effects with the glamour and phantasm descriptors within medium range to dispel them as if using the Counterspell feat. This is resolved before the triggering effect.', '82: The caster is exhausted.', '83: The caster makes a single magical skill check against all Illusion sphere effects and effects with the glamour and phantasm descriptors within medium range to dispel them as if using the Counterspell feat. This is resolved after the triggering effect.', '84: (Combat) For 1d6 rounds, all allied creatures within medium range become invisible as the Invisibility talent.', '85: For 1 round per caster level, an illusion depicting the greatest fear of the caster appears within close range and menaces the caster. This figment cannot be larger than the maximum illusion size of the caster.', '86: For 1 round per caster level, the caster appears to be weak and harmless. Any creature targeting the caster with an attack roll or non-harmless effect must succeed on a Will save or be forced to choose a different target or lose their action.', '87: Illusory cold surrounds fills the illusion range of the caster, acting as per the category 3 cold of the Weather sphere + 1 category per 7 caster levels.', '88: The effect ends the first time a hostile creature within 20 ft. of it succeeds on a Will save against an Illusion sphere or illusion school effect.', '89: For 1d6 rounds, illusory duplicates of all creatures within close range of the caster at the time this result is triggered attack the original creatures. Treat these duplicates as having the benefit of the Illusionary Touch talent taken twice as well as the Illusionary Sound talent.', '90: (Combat) The caster is nauseated for 1 round.', '91: The casting time decreases by 2 steps.', '92: The face of the caster is covered with a repulsive illusory disguise as the Illusionary Disguise talent for 1 minute per caster level, imposing a penalty equal to caster level on all Charisma-based checks.', '93: All allied creatures within medium range gain illusory doubles. These illusory doubles impose a 50% miss chance on any attack against the creature and each duplicate disappears after one attack fails against this miss chance or after 1 minute per caster level.', '94: The spell point cost of the effect increases by 1d4. If the caster does not have enough spell points, he is instead dazed until the end of his next turn.', '95: For 1 round per caster level, a swarm of illusory insects covers an area out to illusion range, dealing 1 point of nonlethal damage per 2 caster levels. This effect remains stationary. When first exposed to this effect, a creature is allowed a single Will save to negate the damage from this effect for its duration.', '96: Creatures who disbelieve the effect treat it as opaque, blocking line of sight.', '97: An illusory wind surrounds fills the illusion range of the caster, acting as per the category 3 wind of the Weather sphere + 1 category per 7 caster levels. This wind blows directly toward the caster and dissipates after 1 round per caster level.', '98: Any creature making a Will save to disbelieve the effect must roll twice and take the worst result.', '99: Illusory heat surrounds fills the illusion range of the caster, acting as per the category 3 heat of the Weather sphere + 1 category per 7 caster levels.', '100: For 1 round per caster level, all attended objects within close range of the caster become invisible as the Invisibility talent.'];
