ange of the caster have any natural attack they possess become rounded and soft and deal only nonlethal bludgeoning damage with damage die reduced by one size.', '79: All hostile creatures within close range of the caster must succeed on a Fortitude save or lose any natural attacks they possesses for 1 round per caster level.', '80: (Combat) All allied creatures within close range of the caster must succeed on a Fortitude save or lose any natural attacks they possesses for 1 round per caster level.', '81: The caster takes untyped nonlethal damage equal to caster level. This damage does not force concentration checks to cast or maintain sphere effects or spells.', '82: The caster is fatigued.', '83: The caster is exhausted.', '84: (Combat) The caster is stunned for 1 round.', '85: (Combat) The caster is dazed for 1 round.', '86: (Combat) The caster is nauseated for 1 round.', '87: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '88: Roll again on the Universal wild magic table.', '89: The caster takes 1d4 points of Constitution damage even if he would normally be immune to ability damage. Creatures without a Constitution score instead take Charisma damage.', '90: The caster takes a number of points of ability damage to his casting attribute equal to the caster level/4 (minimum 1) of the effect, even if he would normally be immune to ability damage.', '91: The caster loses access to this sphere for 1d6 rounds.', '92: The caster gains knowledge of one talent of his choice from this sphere for 1 round.', '93: The caster loses knowledge of any of the talents used in the effect (but not the base sphere) for the length of the effect (minimum 1 round).', '94: The effect fails and the action is lost. Spell points or spell slots are lost.', '95: The effect fails and the action is lost. Spell points or spell slots are not lost.', '96: The effect fails, but the action is not lost. Spell points or spell
