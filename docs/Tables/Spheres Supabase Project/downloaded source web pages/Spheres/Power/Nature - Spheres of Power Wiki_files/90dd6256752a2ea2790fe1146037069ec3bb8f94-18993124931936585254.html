    rand = Math.random;
    stringArray = ['1: (Combat) The metallic weapons of all creatures within close range of the caster dull, causing them to deal bludgeoning damage for 1 minute per caster level.', '2: For 1d6 rounds, the caster is surrounded by a dust storm, as per the Dust Storm talent.', '3: The spell point cost of the effect increases by 1. If the caster does not have enough spell points, he is instead staggered until the end of his next turn.', '4: For 1 round per caster level, the caster is polymorphed into a water elemental as the Elemental Transformation talent of the Alteration sphere, granting only the elemental resistance (cold) ability as a trait. This overrides any polymorph effects currently active on the caster.', '5: For 1 hour per caster level, all plants become hostile to the caster. All plant creatures are hostile to the caster, and if any plant is capable of movement or is animated, such as through the pummel geomancing ability, they will attack the caster if at all possible, ignoring all other targets.', '6: All creatures within close range of the target or center of the target area must succeed on a Reflex save or catch on fire.', '7: For 1d6 hours, all flowers within long range of the caster smell foul. All creatures who end a turn standing in a square that has a flower is sickened until leaving the square. Creatures that do not breathe are not affected.', '8: Effect receives a +2 bonus to caster level.', '9: The nearest hostile creature within long range is surrounded by a dust storm, as per the Dust Storm talent, for 1d6 rounds.', '10: The metallic armor of all allied creatures within close range of the caster sprout spikes, granting them armor spikes or increasing the damage dice of existing armor spikes by one size but also increasing the ACP of the armor by 2 and the ASF by 10%. This lasts for 1 minute per caster level.', '11: For 1d6 days, all rodents within long range of the caster become attracted to him, following him as closely as possible. The rodents will take turns to find food, but otherwise will not voluntarily leave the side of the caster. The caster does not automatically gain any control over the rodents.', '12: As an instantaneous effect, the caster is covered in ice as the freeze option of the Water package. This ice is 1 inch thick, +1 inch per 5 caster levels.', '13: The caster is exhausted.', '14: (Combat) All animals within long range must succeed on a Will save or have their attitude become shifted to helpful toward creatures hostile toward the caster for 1 minute per caster level.', '15: For 1 hour per caster level, all Diminutive-sized rocks within close range follow the caster at a speed of 20 ft., detecting him and moving towards him. If they reach the caster, they crowd around his feet, making his first square of movement each round count as difficult terrain.', '16: The caster is fatigued.', '17: The nearest creature of the animal type (within 1 mile) becomes hostile towards the caster, seeking him out and attacking with reckless abandon. This creature continues to attempt to attack for 1 hour or until slain.', '18: All animals within long range must succeed on a Will save or have their attitude become shifted to hostile toward creatures allied with the caster for 1 minute.', '19: All hostile creatures within close range of the caster must succeed on a Reflex save or catch on fire.', '20: For 1d6 rounds, all water within close range of the caster begins to boil. Canteens burst, and any creature in contact with water suffers 1d6 points of fire damage per 2 caster levels.', '21: The spell point cost of the effect decreases by 1. If the effect did not require any spell points, the caster instead gains 1 temporary spell point that expires at the end of his next turn.', '22: (Combat) Thick mist encompasses everything within medium range of the caster, reducing the size of all mundane fires by 1 category and soaking all creatures caught within. The mist remains for 1 round per caster level.', '23: As an instantaneous effect, all unhewn stones within close range carve themselves to reflect your thoughts at the moment this effect takes place.', '24: All creatures within close range of the caster must succeed on a Reflex save or become entangled by plants, shifting rocks, or ice as appropriate to the environment for 1d6 rounds.', '25: For 1 hour per caster level, a dramatic fog covers the area around the feet of the caster. This does not provide any concealment to the caster, but may obscure caltrops, tripwires, and other low-lying objects.', '26: The metallic weapons of all hostile creatures within close range of the target or center of the target area dull, causing them to deal bludgeoning damage for 1 minute per caster level.', '27: All allied creatures within close range of the caster must succeed on a Reflex save or catch on fire.', '28: All flames within long range of the caster increase 1 size for 1 round per caster level.', '29: The casting time decreases by 1 step.', '30: The effect fails, but the action is not lost. Spell points or spell slots spent are lost.', '31: The casting time decreases by 2 steps.', '32: All animals within long range must succeed on a Will save or have their attitude become shifted to hostile toward all creatures without the Animal type within close range of the animal for 1 minute per caster level.', '33: For 1 round per caster level, all inanimate objects within long range of the position of the caster when this result is triggered begin babbling incoherently, imposing a penalty on sound-based Perception checks in the area equal to caster level and a spell failure chance of 15% on any effect requiring verbal components. This effect remains stationary.', '34: (Combat) The caster is dazed for 1 round.', '35: Blocks of ice (5-ft. cubes) instantaneously form in each empty space adjacent to but not directly above the nearest hostile creature within long range.', '36: All creatures within close range of the caster must succeed on a Reflex save or catch on fire.', '37: As an instantaneous effect, all crops and other food-bearing plants within close range of the caster immediately die.', '38: The space of the caster lowers 5 ft. as the Forge Earth (geomancing) talent.', '39: The metallic weapons of all hostile creatures within close range of the caster dull, causing them to deal bludgeoning damage for 1 minute per caster level.', '40: The space of the caster raises 5 ft. as the Forge Earth (geomancing) talent.', '41: All animals within long range must succeed on a Will save or have their attitude become shifted to helpful toward allies of the caster for 1 minute per caster level.', '42: Stone forms over all hostile creatures within close range, granting DR/adamantine equal to 1/2 caster level (minimum 1) for 1 minute.', '43: (Combat) The metallic weapons of all allied creatures within close range of the caster dull, causing them to deal bludgeoning damage for 1 minute per caster level.', '44: Bark grows over all creatures within close range of the caster, increasing their natural armor bonus by 1 + 1 per 5 caster levels for 1 minute.', '45: The space of all hostile creatures within close range lowers 5 ft. as the Forge Earth (geomancing) talent.', '46: The metallic armor of all allied creatures within close range of the target or center of the target area sprout spikes, granting them armor spikes or increasing the damage dice of existing armor spikes by one size but also increasing the ACP of the armor by 2 and the ASF by 10%. This lasts for 1 minute per caster level.', '47: Ice forms around the feet and limbs of all creatures within close range of the caster, who must succeed on a Reflex save or be entangled and unable to move. In addition, the square of each affected creature becomes slick with ice and counts as difficult terrain. Breaking free of the entangled condition is a move action, requiring either a Strength check or Escape Artist check against the save DC of the triggering effect. A creature may also destroy the ice on a creature or square by dealing 3 points of damage per caster level to the ice. This removes the entangled condition from the creature and destroys the difficult terrain. The ice melts after 1 minute.', '48: As an instantaneous effect, the ground within close range becomes covered in mounds of dirt, becoming difficult terrain.', '49: All vegetation within long range of the caster decrease in size by one size category for 1 round per caster level.', '50: All animals within long range must succeed on a Will save or have their attitude become shifted to helpful toward all creatures with the Animal type for 1 minute per caster level.', '51: For 1 round per caster level, the caster is polymorphed into a fire elemental as the Elemental Transformation talent of the Alteration sphere, granting only the elemental resistance (fire) ability as a trait. This overrides any polymorph effects currently active on the caster.', '52: As an instantaneous effect, one tree (to a maximum size equal to that which the caster can control through the pummel geomancing ability) grows adjacent to the caster. The tree is under the effect of the pummel geomancing ability for 1d6 rounds and will attack any creature within reach, first targeting the caster and his allies.', '53: All vegetation within long range of the caster increase in size by one size category for 1 round per caster level.', '54: The caster loses knowledge of any of the talents used in the effect (but not the base sphere) for the length of the effect (minimum 1 round).', '55: All unattended flammable objects within close range of the caster are set on fire.', '56: The caster takes 1d4 points of Constitution damage even if he would normally be immune to ability damage. Creatures without a Constitution score instead take Charisma damage.', '57: The casting time increases by 1 step.', '58: Roll again on the Universal wild magic table.', '59: All leaves within long range of the caster change color to bright pink for 1 day per caster level.', '60: For 1 hour per caster level, all plants become enamored of the caster. All plant creatures are helpful to the caster, and if any plant is capable of movement or is animated such as through the pummel ability, they will attack the enemies of the caster if at all possible, ignoring all other targets. These creatures will follow the caster and refuse to stay away, attempting to touch the caster at all times if possible.', '61: (Combat) A sphere of water envelops the caster, forming a vortex around him, which remains for 1 round per caster level.', '62: A sphere of water envelops one creature the caster chooses within geomancing range, forming a vortex around it, which remains for 1 round per caster level.', '63: Stone forms over all creatures within close range granting DR/adamantine equal to 1/2 caster level (minimum 1) for 1 minute', '64: The caster takes a number of points of ability damage to his casting attribute equal to the caster level/4 (minimum 1) of the effect, even if he would normally be immune to ability damage.', '65: Effect receives a -4 penalty to caster level (minimum 1).', '66: As an instantaneous effect, for 1 round per caster level, flowers sprout from the casters footsteps. These flowers are random wildflowers suitable to the environment if possible and have no intrinsic properties.', '67: All hostile creatures within close range of the target or center of the target area must succeed on a Reflex save or catch on fire.', '68: All flames within long range of the caster decrease 1 size for 1 round per caster level.', '69: For 1 hour per caster level, the nearest creature of the animal type (within 1 mile) becomes friendly towards the caster, seeking him out and obeying all commands to the best of its ability. This does not make the animal trained, but even wild animals can be protective of the caster and attack those who are hostile towards him.', '70: All non-magical fires within long range of the caster are extinguished.', '71: For 1 round per caster level, the caster is polymorphed into an earth elemental as the Elemental Transformation talent of the Alteration sphere, granting only the elemental resistance (acid) ability as a trait. This overrides any polymorph effects currently active on the caster.', '72: Ice forms around the feet and limbs of the caster who must succeed on a Reflex save or be entangled and unable to move. In addition, the square of the caster becomes slick with ice and counts as difficult terrain. Breaking free of the entangled condition is a move action, requiring either a Strength check or Escape Artist check against the save DC of the triggering effect. A creature may also destroy the ice on a creature or square by dealing 3 points of damage per caster level to the ice. This removes the entangled condition from the creature and destroys the difficult terrain. The ice melts after 1 minute in normal conditions.', '73: As an instantaneous effect, the space below all creatures within geomancing range becomes covered in 1 ft. of sand.', '74: All creatures within close range of the target or center of the target area must succeed on a Reflex save or fall prone as the ground shakes.', '75: The space of all hostile creatures within close range raises 5 ft. as the Forge Earth (geomancing) talent.', '76: All plants within close range gain the ability to speak common for 1 day per caster level. The plants talk incessantly and will discuss anything and everything they can, but they do not gain increased intelligence to give them a variety of topics.', '77: (Combat) Blocks of ice (5-ft. cubes) instantaneously form in each empty space adjacent to but not directly above the caster.', '78: The effect fails and the action is lost. Spell points or spell slots are lost.', '79: The caster takes untyped nonlethal damage equal to caster level. This damage does not force concentration checks to cast or maintain sphere effects or spells.', '80: For 1 round per caster level, the caster is polymorphed into an air elemental as the Elemental Transformation talent of the Alteration sphere, granting only the elemental resistance (electricity) ability as a trait. This overrides any polymorph effects currently active on the caster.', '81: For 1d6 rounds, all water within close range of the caster freezes. Any creature in contact with water must pass a Reflex save or be trapped.', '82: For 1 round per caster level, the caster is polymorphed into a plant creature as the Plant Transformation talent of the Alteration sphere, granting only the +2 natural armor bonus ability as a trait. This overrides any polymorph effects currently active on the caster.', '83: The casting time increases by 2 steps.', '84: The metallic armor of all creatures within close range of the target or center of the target area sprout spikes, granting them armor spikes or increasing the damage dice of existing armor spikes by one size but also increasing the ACP of the armor by 2 and the ASF by 10%. This lasts for 1 minute per caster level.', '85: The spell point cost of the effect increases by 1d4. If the caster does not have enough spell points, he is instead dazed until the end of his next turn.', '86: All animals within close range benefit from the Logos talent for 1 minute per caster level.', '87: (Combat) The caster is nauseated for 1 round.', '88: Roll twice and take both results. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '89: The air within close range erupts into flames, dealing 1d6 points of fire damage per two caster levels (minimum 1d6) to all targets within the area (Reflex half).', '90: The effect fails and the action is lost. Spell points or spell slots are not lost.', '91: The caster loses access to this sphere for 1d6 rounds.', '92: All animals within long range must succeed on a Will save or have their attitude become shifted to hostile toward creatures hostile to the caster for 1 minute', '93: As an instantaneous effect, any bodies of water within long range raise 2 ft. or double in volume, whichever comes first. Canteens, pots, and other containers overflow as the amount of water in them doubles. The water levels will be restored to their natural level over time by drainage, evaporation, etc.', '94: A sphere of water envelops a random creature within close range of the caster, forming a vortex around it, which remains for 1 round per caster level.', '95: The caster gains knowledge of one talent of his choice from this sphere for 1 round.', '96: All creatures within close range of the caster must succeed on a Reflex save or fall prone as the ground shakes.', '97: (Combat) The caster is stunned for 1 round.', '98: As an instantaneous effect, poison ivy grows in a 5-ft. radius + 5 ft. per 5 caster level around the caster. The caster and any creature who enters the area must make a Fortitude save or take -1 penalty (which increases by 1 per 5 caster levels) on all magic skill checks made to concentrate for 1 hour per caster level. This is a poison effect.', '99: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '100: All allies within close range benefit from the Speak With Animals talent for 1 minute per caster level.'];
