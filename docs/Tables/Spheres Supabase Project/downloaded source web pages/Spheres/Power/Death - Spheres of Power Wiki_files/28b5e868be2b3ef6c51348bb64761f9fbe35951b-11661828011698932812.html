    rand = Math.random;
    stringArray = ['1: The caster loses knowledge of any of the talents used in the effect (but not the base sphere) for the length of the effect (minimum 1 round).', '2: The effect fails and the action is lost. Spell points or spell slots are not lost.', '3: The heart of the caster stops beating for 1d4 days. although their body is preserved magically for that duration. During this time, the caster does not need to breath and any diseases and poisons have no effect on him until the duration ends.', '4: All undead creatures within medium range of the caster must succeed on a Will save or attack the caster to the best of their ability for 1 round plus 1 round per 5 caster levels. This effect applies to any undead within range created by the triggering effect.', '5: The caster must succeed on a Fortitude save or be infected with a disease per the Inflict Disease (ghost strike) talent. Roll 1d10 to determine which disease (1 blinding sickness, 2 bubonic plague, 3 cackle fever, 4 filth fever, 5 leprosy, 6 mindfire, 7 red ache, 8 shakes, 9 slimy doom, 10 roll twice and take both, ignoring further results of 10).', '6: All creatures within long range of the caster that are at 0 or fewer hit points are instantly slain. This is a death effect.', '7: For 1 hour per caster level, the caster exudes the scent of decaying flesh, attracting the attention of carrion feeders and causing most creatures interacting with the caster have their disposition drop by one step until the end of this effect.', '8: Any undead under the control of the caster enter a rage, as a 1st level barbarian (core or unchained, the caster chooses). Bonuses or penalties to Constitution are applied to Charisma instead. This rage lasts for 1d6 rounds. During this time, the undead remain under the control of the caster, but must attack targets within range; if no enemies are to be found, they will attack allies.', '9: For 1 round per caster level, the caster emits an aura out to close range that forces all living creatures that end their turn within it to succeed on a Fortitude save or take 1 negative level. All negative levels from this effect stack. The caster is included in this effect.', '10: All creatures within close range of the caster must succeed on a Fortitude save or take 1 temporary negative level. This increases to 1d2 negative levels at caster level 5 and by one additional die size every 5 caster levels thereafter. These negative levels last for 1 minute per caster level and cannot cause the negative level total of the creature to equal or exceed the Hit Dice of the creature.', '11: The caster emits an aura out to close range for 1d4 rounds, dealing 1d6 points of negative energy damage per 2 caster levels (minimum 1d6) to all creatures in that area at the beginning of his turn, not including the Caster. A Fortitude save halves this damage.', '12: The caster takes 1d4 points of Constitution damage even if he would normally be immune to ability damage. Creatures without a Constitution score instead take Charisma damage.', '13: All creatures within close range of the target or center of the target area must succeed on a Fortitude save or be nauseated 1 round per caster level.', '14: The caster gains knowledge of one talent of his choice from this sphere for 1 round.', '15: The caster loses his current creature type and gains the undead type for 1 minute per caster level and the caster appears as a zombie. Do not recalculate hit points, saves, or base attack bonus. Any effect dependent on having the undead type that is ongoing on the caster ends when this effect ends.', '16: Undead creatures created by the effect or within close range of the caster when it is cast, for 1 hour per caster level afterwards, will explode in a deadly cloud when destroyed. When such an undead creature is destroyed, it creates a cloud out to close range, as the heavy mist option of category 2 rain per the Weather sphere for 1d6 rounds. Any creature that starts its turn inside this cloud takes 1 point of negative energy damage per caster level.', '17: All creatures within medium range take bleed damage equal to caster level/2 (minimum 1) for caster level rounds or until receiving a DC 15 Heal check or any magical healing.', '18: The caster takes untyped nonlethal damage equal to caster level. This damage does not force concentration checks to cast or maintain sphere effects or spells.', '19: All creatures within close range of the caster must succeed on a Fortitude save or become exhausted.', '20: The caster loses his current creature type and gains the undead type for 1 minute per caster level and the caster appears as a skeleton. Do not recalculate hit points, saves, or base attack bonus. Any ongoing effect dependent on having the undead type that is ongoing on the caster ends when this effect ends.', '21: For 10 minutes per caster level, a floating skull (Tiny-sized of a common humanoid race) follows the caster, giving sarcastic commentary on events and the actions of the caster. This skull has a 30 ft. fly speed (perfect) and is immune to all effects and damage.', '22: (Combat) The caster and the nearest hostile creature that is a valid target switch bodies for 1 round per caster level. This functions as the Possession advanced talent.', '23: The casting time decreases by 2 steps.', '24: Undead creatures created by the effect or within close range of the caster when it is cast are staggered for 1 hour per caster level.', '25: For 1 minute per caster level, the caster emits an aura out to close range that forces all living creatures that end their turn within it to succeed on a Fortitude save or become fatigued. Fatigued creatures are unaffected. The caster is included in this effect.', '26: All creatures within close range of the target or center of the target area must succeed on a Fortitude save or be sickened 1 round per caster level.', '27: Roll twice and choose the result. Ignore any results that require rerolls. If both rolls thus ignored, there is no effect.', '28: The caster is healed by negative energy and harmed by positive energy for 1 minute per caster level.', '29: All creatures within close range of the caster must succeed on a Fortitude save or become fatigued.', '30: The caster makes a single magical skill check against all Death sphere and necromancy school effects within medium range to dispel them as if using the Counterspell feat. This is resolved after the triggering effect.', '31: (Combat) For 1 round per caster level, all creatures of the undead type within medium range of the caster are confused. This bypasses immunities granted by the undead type.', '32: For 1 minute per caster level, the caster emits an aura out to close range that deals untyped damage to undead creatures equal to caster level during any turn that the begin or end within it.', '33: (Combat) All allied creatures within close range of the caster must succeed on a Fortitude save or be nauseated 1 round per caster level.', '34: All allied creatures within close range of the target or center of the target area must succeed on a Fortitude save or be sickened 1 round per caster level.', '35: The caster loses access to this sphere for 1d6 rounds.', '36: All creatures within close range of the target must succeed on a Fortitude save or take 1d4 + CL/2 points of Dexterity damage that disappears after 1 round per caster level.', '37: For 1 minute per caster level, the caster emits an aura out to close range that grants undead creatures fast healing equal to half the caster level of the effect during any turn that they begin or end within it.', '38: The target must succeed on a Fortitude save or be infected with a disease per the Inflict Disease (ghost strike) talent. Roll 1d10 to determine which disease (1 blinding sickness, 2 bubonic plague, 3 cackle fever, 4 filth fever, 5 leprosy, 6 mindfire, 7 red ache, 8 shakes, 9 slimy doom, 10 roll twice and take both, ignoring further results of 10). If the target is undead, it instead inflicts this disease on the first creature it strikes with a natural attack.', '39: The caster takes 1 temporary negative level. This increases to 1d2 negative levels at caster level 5 and by one additional die size every 5 caster levels thereafter. These negative levels last for 1 minute per caster level and cannot cause the negative level total of the caster to equal or exceed their Hit Dice.', '40: The caster makes a single magical skill check against all Death sphere and necromancy school effects within medium range to dispel them as if using the Counterspell feat. This is resolved before the triggering effect.', '41: All creatures within close range of the caster must succeed on a Fortitude save or take 1d4 + CL/2 points of Strength damage that disappears after 1 round per caster level.', '42: (Combat) The caster is nauseated for 1 round.', '43: The caster is compelled to exhume the body of 1 creature of the humanoid type per 3 caster levels (minimum 1). This compulsion will not cause the caster to deliberately enter dangerous situations, but overrides all other concerns. This effect persists for one day per caster level or until the compulsion is fulfilled.', '44: All creatures within close range of the target or center of the target area must succeed on a Fortitude save or become exhausted.', '45: Nearby dead invertebrates of Tiny size and smaller animate as undead and follow the caster for 10 minutes per caster level. Their noise imposes a penalty on Stealth checks equal to half caster level (minimum 1).', '46: All creatures within close range of the caster must succeed on a Fortitude save or take 1d4 + CL/2 points of Dexterity damage that disappears after 1 round per caster level.', '47: All corpses within long range of the caster (other than those targeted by the triggering effect) become undead per reanimate for 1 round per caster level. These undead are hostile toward the caster.', '48: The caster takes a -4 penalty on all saves against disease for 10 minutes per caster level.', '49: All creatures within close range of the target must succeed on a Will save or be paralyzed for 1 round. This is a mind-affecting fear effect.', '50: For 1 hour per caster level, all living creatures find the caster unsettling. A Handle Animal check with a DC equal to 10 + caster level/2 is required to make any animal approach within 20 ft. of the caster and all creatures interacting with the caster have their disposition drop by one step until the end of this effect.', '51: (Combat) All creatures within close range of the caster must succeed on a Will save or be paralyzed for 1 round. This is a mind-affecting fear effect.', '52: For 1 minute per caster level, the caster emits an aura out to close range that forces all living creatures that end their turn within it to succeed on a Fortitude save or contract a random disease. Roll 1d10 to determine which disease (1 blinding sickness, 2 bubonic plague, 3 cackle fever, 4 filth fever, 5 leprosy, 6 mindfire, 7 red ache, 8 shakes, 9 slimy doom, 10 roll twice and take both, ignoring further results of 10). The caster is excluded from this effect.', '53: Undead creatures created by the effect or within close range of the caster when it is cast, for 1 hour per caster level afterwards, will explode in a miasmic cloud when destroyed. When such an undead creature is destroyed, it creates a cloud out to close range, as the heavy mist option of category 2 rain per the Weather sphere for 1d6 rounds. Any creature that starts its turn inside this cloud must save against filth fever, using your Death sphere DC in place of the disease DC.', '54: The caster takes a -4 penalty on all saves versus death effects for 10 minutes per caster level.', '55: Effect receives a +2 bonus to caster level.', '56: For 1 minute per caster level, the caster emits an aura out to close range that forces all living creatures that end their turn within it to succeed on a Fortitude save or contract a random disease. Roll  energy damage equal to caster level. Creatures healed by negative energy are instead healed. A creature may only be affected by this ability once per turn.', '65: The spell point cost of the effect increases by 1. If the caster does not have enough spell points, he is instead staggered until the end of his next turn.', '66: All creatures within close range of the target must succeed on a Fortitude save or take 1 temporary negative level. This increases to 1d2 negative levels at caster level 5 and by one additional die size every 5 caster levels thereafter. These negative levels last for 1 minute per caster level and cannot cause the negative level total of the creature to equal or exceed their Hit Dice.', '67: All undead creatures within medium range of the target must succeed on a Will save or attack the caster to the best of their ability for 1 round plus 1 round per 5 caster levels. This effect applies to any undead created by the triggering effect.', '68: For 1 day per caster level, one of the limbs of the caster (usually an arm) becomes skeletal. This has no mechanical effect, but may cause negative reactions if not concealed.', '69: The casting time decreases by 1 step.', '70: (Combat) The caster is dazed for 1 round.', '71: The caster becomes imperceptible to undead creatures for 1 minute per caster level.', '72: Undead creatures created by the effect or within close range of the caster when it is cast lose their immunity to mind-affecting effects for 1 hour per caster level. For the purpose of such effects, treat them as if they were the creatures they were in life.', '73: Roll again on the Universal wild magic table.', '74: The caster emits an aura of pestilence out to close range for 10 minutes per caster level. All creatures within this area, including the caster, take a -2 penalty on all saves against disease.', '75: All creatures within close range of the target or center of the target area must succeed on a Fortitude save or become fatigued.', '76: Fo
